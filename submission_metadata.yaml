ai_usage_summary: |
  Used Claude for architectural discussion and code review.
  No candidate data was fed to any LLM during development or ranking.
  All scoring logic is rule-based and deterministic.

methodology_summary: |
  Multi-signal weighted scoring system with five components:
  role substance (30%), technical skills (25%), experience quality (20%),
  behavioral signals (15%), location fit (10%).

  Key design choices:
  - Role substance analyzed via career title history + description keywords
    (not just skills list), preventing keyword-stuffer false positives
  - Skill taxonomy in 3 tiers matching JD's must-have/nice-to-have structure;
    proficiency and duration_months both scale contribution
  - Consulting-only career detection (TCS/Infosys/Wipro/Accenture/etc.) with
    hard 0.25× penalty, per JD's explicit disqualifier
  - Behavioral availability as a true signal: open_to_work, recency, response
    rate, notice period combined with specific weights
  - Honeypot detection: expert skills + 0 duration_months → disqualify
  Runtime: ~14 seconds for 100K candidates on single CPU core, no dependencies.

declarations:
